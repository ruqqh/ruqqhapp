<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RUQQH | Software, Systems & Cybersecurity</title>
    <script>
      // Diagnostic check: If this prints, HTML is loading
      console.log('RUQQH Boot Protocol Initiated');
      
      // Provide a safe 'global' object
      window.global = window.global || {};
      
      // Prevent polyfill crashes on read-only fetch
      try {
        if (window.fetch && Object.getOwnPropertyDescriptor(window, 'fetch')?.configurable === true) {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            configurable: false,
            enumerable: true,
            get: () => originalFetch,
            set: () => { console.warn('Blocked attempt to overwrite window.fetch'); }
          });
        }
      } catch (e) {
        console.warn('Fetch lock skipped:', e);
      }
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
